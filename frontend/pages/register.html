<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — CinePlex</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-card__logo">CINEPLEX</div>
  <h1 class="auth-card__title">Create account</h1>
  <p class="auth-card__sub">Join CinePlex and start booking your seats</p>

  <form class="auth-form" id="reg-form" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-control" type="text" id="username" placeholder="Choose a username" required autocomplete="username" minlength="3">
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email (optional)</label>
      <input class="form-control" type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-control" type="password" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm">Confirm Password</label>
      <input class="form-control" type="password" id="confirm" placeholder="Repeat password" required autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label" for="phone">Phone Number</label>
      <input 
        class="form-control" 
        type="tel" 
        id="phone" 
        placeholder="Enter your phone number" 
        required
      >
    </div>
    <div id="reg-error" class="hidden" style="
      background: var(--red-dim); border: 1px solid rgba(232,75,75,.3);
      border-radius: var(--radius-sm); padding: .7rem 1rem;
      color: var(--red); font-size: .85rem;
    "></div>

    <button type="submit" class="btn btn-primary btn-block btn-lg" id="reg-btn">
      Create Account
    </button>
  </form>

  <div class="auth-divider"><span>or</span></div>
  <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  <p class="auth-link mt-sm"><a href="../index.html">← Back to Home</a></p>
</div>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>
  if (window.Auth.isLoggedIn()) window.location.href = '../index.html';

  async function handleRegister(e) {
    e.preventDefault();
    const btn    = document.getElementById('reg-btn');
    const errEl  = document.getElementById('reg-error');
    const uname  = document.getElementById('username').value.trim();
    const email  = document.getElementById('email').value.trim();
    const pass   = document.getElementById('password').value;
    const conf   = document.getElementById('confirm').value;
    const phone = document.getElementById('phone').value.trim();
    if (pass !== conf) {
      errEl.textContent = 'Passwords do not match';
      errEl.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    errEl.classList.add('hidden');

    try {
      await API.Auth.register(uname, pass, email || null, phone);
      showToast('Account created! Please sign in.', 'success');
      setTimeout(() => window.location.href = 'login.html', 1000);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>

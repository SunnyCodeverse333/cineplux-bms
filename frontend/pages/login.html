<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CinePlex</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-card__logo">CINEPLEX</div>
  <h1 class="auth-card__title">Welcome back</h1>
  <p class="auth-card__sub">Sign in to your account to continue</p>

  <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-control" type="text" id="username" placeholder="Enter your username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-control" type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
    </div>

    <div id="login-error" class="hidden" style="
      background: var(--red-dim); border: 1px solid rgba(232,75,75,.3);
      border-radius: var(--radius-sm); padding: .7rem 1rem;
      color: var(--red); font-size: .85rem;
    "></div>

    <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
      Sign In
    </button>
  </form>

  <div class="auth-divider"><span>or</span></div>
  <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
  <p class="auth-link mt-sm"><a href="../index.html">← Back to Home</a></p>
</div>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>
  // Redirect if already logged in
  if (window.Auth.isLoggedIn()) {
    window.location.href = Utils.getParam('redirect') || '../index.html';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.classList.add('hidden');

    try {
      const data = await API.Auth.login(username, password);
      window.Auth.saveSession(data);
      showToast('Welcome back, ' + data.username + '!', 'success');
      setTimeout(() => {
        const redirect = Utils.getParam('redirect');
        window.location.href = redirect || '../index.html';
      }, 600);
    } catch (err) {
      errEl.textContent = err.message === 'HTTP 401' ? 'Invalid username or password' : err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
